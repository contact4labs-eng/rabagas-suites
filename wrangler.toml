# Phase 11a: the @astrojs/cloudflare adapter v13's auto-generated prerender
# wrangler.json declares `assets: { binding: "ASSETS" }` which conflicts with
# Pages's reserved binding name (validated by recent wrangler versions).
# Workaround: omit `pages_build_output_dir` from this top-level config so
# the inherited prerender wrangler.json is validated as a Workers config
# (where ASSETS is acceptable) rather than a Pages config. The actual
# `wrangler pages dev` invocation passes the dist directory explicitly via
# the npm `preview` script (see package.json).

# Secrets are NOT defined in this file. Local development reads them from
# `.dev.vars` (gitignored); production reads them from the Cloudflare Pages
# dashboard. The endpoint we use them in: src/pages/api/inquiry.ts via
# `import.meta.env.RESEND_API_KEY` and `import.meta.env.EMAIL_TO`.

# `nodejs_compat` flag (above) is required by @astrojs/cloudflare's runtime
# helpers since v12. It does NOT mean we're running Node — Workers still
# run on V8 isolates with the workerd runtime. The flag enables the polyfill
# layer the adapter relies on.
